<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f6f4ef">
  <title>Urlaubskasse</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1f2a27;background:#f6f4ef}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
    main{width:min(100%,440px);background:#fff;border:1px solid #dcd8cf;border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(31,42,39,.08)}
    h1{margin:0 0 10px;font-size:2rem}p{margin:0;color:#68726d;line-height:1.5}.bar{height:8px;background:#dcebe5;border-radius:99px;overflow:hidden;margin-top:22px}.bar::after{content:"";display:block;height:100%;width:40%;background:#2f6b5d;border-radius:inherit;animation:move 1.1s infinite ease-in-out}@keyframes move{0%{transform:translateX(-120%)}100%{transform:translateX(350%)}}pre{white-space:pre-wrap;font-size:.8rem;color:#a84a3d}
  </style>
</head>
<body>
<main><h1>Urlaubskasse</h1><p id="status">Oberfläche wird geladen …</p><div class="bar" id="bar"></div><pre id="error" hidden></pre></main>
<script>
(async()=>{
  const status=document.querySelector('#status');
  const error=document.querySelector('#error');
  const fail=e=>{document.querySelector('#bar').hidden=true;status.textContent='Die Oberfläche konnte nicht geladen werden.';error.hidden=false;error.textContent=String(e?.message||e)};
  try{
    if(!('DecompressionStream' in window)) throw new Error('Dieser Browser unterstützt die benötigte Dekomprimierung nicht.');
    const sourceUrl='https://raw.githubusercontent.com/holypetrus1/abrechnung/main/build_site.py?v=3';
    const source=await fetch(sourceUrl,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(`Build-Datei nicht gefunden (${r.status})`);return r.text()});
    const marker='BUNDLE = """';
    const start=source.indexOf(marker);
    const end=start<0?-1:source.indexOf('"""',start+marker.length);
    if(start<0||end<0)throw new Error('Website-Paket konnte nicht gelesen werden.');
    const clean=source.slice(start+marker.length,end).replace(/\s+/g,'');
    const binary=atob(clean);
    const zipped=Uint8Array.from(binary,c=>c.charCodeAt(0));
    const stream=new Blob([zipped]).stream().pipeThrough(new DecompressionStream('gzip'));
    const tar=new Uint8Array(await new Response(stream).arrayBuffer());
    const files=new Map();
    const decoder=new TextDecoder();
    const readText=(start,length)=>decoder.decode(tar.slice(start,start+length)).replace(/\0.*$/s,'');
    for(let offset=0;offset+512<=tar.length;){
      const name=readText(offset,100);
      if(!name)break;
      const prefix=readText(offset+345,155);
      const path=(prefix?`${prefix}/`:``)+name;
      const sizeText=readText(offset+124,12).trim();
      const size=parseInt(sizeText||'0',8)||0;
      const type=String.fromCharCode(tar[offset+156]||48);
      const fileStart=offset+512;
      if(type==='0'||type==='\0')files.set(path,tar.slice(fileStart,fileStart+size));
      offset=fileStart+Math.ceil(size/512)*512;
    }
    const get=(...names)=>{for(const n of names){if(files.has(n))return files.get(n)}for(const [k,v] of files){if(names.some(n=>k.endsWith('/'+n)))return v}return null};
    const pageBytes=get('index-standalone.html','index.html');
    if(!pageBytes)throw new Error('Startseite fehlt im Website-Paket.');
    let page=decoder.decode(pageBytes);
    const protocol=get('protokoll.md');
    const workbook=get('Urlaubskasse_Woche1.xlsx');
    const urls=[];
    if(protocol){const u=URL.createObjectURL(new Blob([protocol],{type:'text/markdown;charset=utf-8'}));urls.push(u);page=page.replaceAll('https://raw.githubusercontent.com/holypetrus1/abrechnung/main/protokoll.md',u)}
    if(workbook){const u=URL.createObjectURL(new Blob([workbook],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));urls.push(u);page=page.replaceAll('https://raw.githubusercontent.com/holypetrus1/abrechnung/main/Urlaubskasse_Woche1.xlsx',u)}
    document.open();document.write(page);document.close();
  }catch(e){console.error(e);fail(e)}
})();
</script>
</body>
</html>
