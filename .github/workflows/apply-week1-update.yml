name: Vier neue Ausgaben in Woche 1 übernehmen

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-week1-update.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Aktualisierte Dateien aus Paket herstellen
        shell: bash
        run: |
          set -euo pipefail
          cat tmp_update/bundle.part* > /tmp/week1-update.b64
          base64 --decode /tmp/week1-update.b64 > /tmp/week1-update.tar.gz
          tar -xzf /tmp/week1-update.tar.gz -C .

          python - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          data = json.loads(Path('data/buchungen.json').read_text(encoding='utf-8'))
          assert data['balances']['total_allocated_expenses'] == 561.32
          assert len(data['transactions']) == 11
          assert {t['id'] for t in data['transactions'][-4:]} == {
              'BON-20260720-001', 'BON-20260720-002',
              'BON-20260720-003', 'AUS-20260720-001'
          }
          with zipfile.ZipFile('exports/Urlaubskasse_Woche1.xlsx') as workbook:
              assert workbook.testzip() is None
          PY

      - name: Temporäre Dateien entfernen und Ergebnis speichern
        shell: bash
        run: |
          set -euo pipefail
          rm -rf tmp_update
          rm .github/workflows/apply-week1-update.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/buchungen.json data/protokoll.md data/status.md exports/Urlaubskasse_Woche1.xlsx tmp_update .github/workflows/apply-week1-update.yml
          git commit -m "Vier Ausgaben mit Kostenblöcken erfassen"
          git push

# Updatepaket repariert; erneute Auslösung.
