name: GitHub Pages bereitstellen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
      - name: Statische Website erzeugen
        run: python build_site.py
      - name: Excel-Datei erzeugen
        run: python public/scripts/build_excel.py
      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5
      - name: Website-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Website veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
